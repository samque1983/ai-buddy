# Fly.io deployment config.
# First deploy:
#   fly launch --no-deploy          # creates the app, keep this file
#   fly secrets set SUPABASE_SERVICE_ROLE_KEY=... ANTHROPIC_API_KEY=... OPENAI_API_KEY=...
#   fly deploy
app = "ai-english-buddy"
primary_region = "sin"

[build]
  # NEXT_PUBLIC_* are baked into the client bundle at build time (public values).
  [build.args]
    NEXT_PUBLIC_SUPABASE_URL = "https://djkctyodgmiqdogexsee.supabase.co"
    # anon key is a public client identifier (access is enforced by RLS)
    NEXT_PUBLIC_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqa2N0eW9kZ21pcWRvZ2V4c2VlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1Njc0MzEsImV4cCI6MjEwMDE0MzQzMX0.R7FNJXkM-bsZ7TK0kd2L27JjqnQoQZ6qfZovAyQfUiE"
    NEXT_PUBLIC_APP_URL = "https://ai-english-buddy.fly.dev"
    # Stage-2: enable the server WS relay for 流畅模式 (browser ⇄ our server ⇄ OpenAI).
    # Roll back instantly by removing this line (or setting to "webrtc") + redeploy.
    NEXT_PUBLIC_REALTIME_TRANSPORT = "ws"

[env]
  # Also needed at RUNTIME (not just build): the custom server (server.ts) runs under
  # tsx, which does NOT inline NEXT_PUBLIC_* the way `next build` does. Without these
  # the relay's Supabase client throws on every WS upgrade. Public values (anon key is
  # a public identifier; access is enforced by RLS).
  NEXT_PUBLIC_SUPABASE_URL = "https://djkctyodgmiqdogexsee.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqa2N0eW9kZ21pcWRvZ2V4c2VlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1Njc0MzEsImV4cCI6MjEwMDE0MzQzMX0.R7FNJXkM-bsZ7TK0kd2L27JjqnQoQZ6qfZovAyQfUiE"
  REALTIME_MODEL = "gpt-realtime"
  LLM_PROVIDER = "anthropic"
  LLM_MODEL = "claude-sonnet-5"
  STT_PROVIDER = "openai"
  STT_MODEL = "whisper-1"
  TTS_PROVIDER = "openai"
  TTS_MODEL = "tts-1"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Keep one machine warm: cold starts read as "the app is stuck" to users.
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
